<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hone 实践运营台原型</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --page: #fbfcfe;
        --panel: #ffffff;
        --panel-2: #f7f9fc;
        --panel-3: #eef3f8;
        --ink: #111827;
        --muted: #5f6b7a;
        --subtle: #8a94a3;
        --line: #d8dee8;
        --line-soft: #e8edf3;
        --navy: #0f56b3;
        --teal: #10a6a0;
        --gold: #e0a100;
        --rose: #dc3b52;
        --blue: #1677ff;
        --green: #16a05d;
        --orange: #d68a00;
        --purple: #8b5cf6;
        --surface: rgba(255, 255, 255, 0.98);
        --glass: rgba(255, 255, 255, 0.76);
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
        --radius: 8px;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "SF Pro Text", "Segoe UI", sans-serif;
      }

      html[data-theme="dark"] {
        color-scheme: dark;
        --bg: #07111d;
        --page: #0b1420;
        --panel: #101b2a;
        --panel-2: #142236;
        --panel-3: #172c3f;
        --ink: #f2eadb;
        --muted: #b6c2cc;
        --subtle: #8896a5;
        --line: #405068;
        --line-soft: #27364c;
        --navy: #63b8ec;
        --teal: #52d0bf;
        --gold: #e1ba65;
        --rose: #ee8797;
        --blue: #75b9f0;
        --green: #6dd39a;
        --orange: #ed9b62;
        --surface: rgba(13, 23, 38, 0.96);
        --glass: rgba(255, 255, 255, 0.06);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        min-height: 100vh;
        background: linear-gradient(180deg, #f8fbff, var(--bg));
        color: var(--ink);
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          background-color 140ms ease,
          color 140ms ease,
          box-shadow 140ms ease;
      }

      button:active {
        transform: scale(0.97);
      }

      .prototype {
        width: min(1512px, calc(100vw - 24px));
        height: 100vh;
        margin: 0 auto;
        padding: 12px 0;
      }

      .topbar {
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
        padding-bottom: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-icon,
      .mark-tile {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        flex: 0 0 auto;
        border: 1px solid color-mix(in srgb, var(--blue), transparent 72%);
        border-radius: 9px;
        background: linear-gradient(145deg, #1f7aff, #07386f);
        box-shadow: 0 8px 18px rgba(22, 119, 255, 0.18);
        color: #ffffff;
      }

      .brand-copy {
        flex: 1 1 0;
        min-width: 0;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        line-height: 1.16;
        font-weight: 760;
        overflow-wrap: break-word;
      }

      .subtitle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .top-actions,
      .toolbar,
      .segmented,
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .button,
      .nav-button,
      .chip-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        color: var(--ink);
        font-size: 13px;
        font-weight: 620;
        white-space: nowrap;
      }

      .button {
        padding: 0 12px;
      }

      .button.primary {
        border-color: color-mix(in srgb, var(--blue), transparent 20%);
        background: linear-gradient(180deg, #2383ff, #0f63d8);
        color: #ffffff;
      }

      .button.ghost {
        background: transparent;
      }

      .chip-button {
        min-height: 30px;
        padding: 0 10px;
        color: var(--muted);
        background: var(--panel-2);
      }

      .chip-button.active,
      .nav-button.active {
        border-color: transparent;
        background: color-mix(in srgb, var(--blue), transparent 90%);
        color: var(--blue);
      }

      .shell {
        display: grid;
        grid-template-columns: 318px minmax(0, 1fr);
        gap: 18px;
        align-items: stretch;
        height: calc(100vh - 24px);
      }

      .menu-panel,
      .workbench {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .menu-panel {
        height: calc(100vh - 24px);
        min-height: 0;
        border-radius: 12px;
        background: linear-gradient(180deg, #fbfcfe, #f4f7fb);
      }

      .workbench {
        height: calc(100vh - 24px);
        min-height: 0;
        border-radius: 12px;
        background: #ffffff;
      }

      .chrome {
        display: flex;
        align-items: center;
        gap: 7px;
        height: 36px;
        padding: 0 13px;
        border-bottom: 1px solid var(--line-soft);
        background: color-mix(in srgb, var(--glass), transparent 8%);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .red {
        background: #ff6b76;
      }

      .yellow {
        background: #f0bd5b;
      }

      .green-dot {
        background: #58c878;
      }

      .chrome-label {
        margin-left: 8px;
        color: var(--subtle);
        font-size: 12px;
      }

      .menu-body {
        padding: 10px;
      }

      .menu-brand {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 0 0 14px;
        border-bottom: 1px solid var(--line-soft);
      }

      .menu-brand strong {
        display: block;
        font-size: 15px;
      }

      .menu-brand span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-card,
      .surface,
      .mini-panel,
      .logo-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
      }

      .status-card {
        padding: 10px;
      }

      .menu-stack {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .status-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 7px;
      }

      .status-head strong {
        display: block;
        font-size: 13px;
      }

      .status-head span,
      .meta,
      .small {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .status-head > div > span {
        display: block;
        margin-top: 4px;
      }

      .metric {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }

      .metric div {
        padding: 9px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel-2);
      }

      .metric b {
        display: block;
        color: var(--ink);
        font-size: 18px;
        line-height: 1;
      }

      .metric span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .quick-action {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel);
        color: var(--ink);
        text-align: left;
      }

      .quick-action span {
        color: var(--muted);
        font-size: 12px;
      }

      .quick-action div span {
        display: block;
        margin-top: 4px;
        overflow-wrap: anywhere;
      }

      .pill,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 22px;
        padding: 0 8px;
        border: 1px solid var(--line-soft);
        border-radius: 999px;
        color: var(--muted);
        background: var(--panel-2);
        font-size: 11px;
        font-weight: 680;
        white-space: nowrap;
      }

      .pill.good {
        border-color: color-mix(in srgb, var(--green), transparent 54%);
        color: var(--green);
      }

      .pill.warn {
        border-color: color-mix(in srgb, var(--orange), transparent 50%);
        color: var(--orange);
      }

      .pill.risk {
        border-color: color-mix(in srgb, var(--rose), transparent 46%);
        color: var(--rose);
      }

      .workbench-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        min-height: 55px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line-soft);
      }

      .workbench-title {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }

      .workbench-title .brand-icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
      }

      .view-title strong {
        display: block;
        font-size: 17px;
      }

      .view-title span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line-soft);
        background: color-mix(in srgb, var(--panel-2), transparent 28%);
      }

      .nav-button {
        min-height: 32px;
        padding: 0 11px;
      }

      .content {
        height: calc(100vh - 24px - 62px - 55px);
        overflow: auto;
        padding: 12px;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .grid.cols-2 {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .grid.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .surface {
        padding: 14px;
      }

      .surface-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 10px;
      }

      .surface-head h2,
      .surface-head h3 {
        font-size: 15px;
        line-height: 1.25;
      }

      .surface-head p {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .loop-map {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .loop-card {
        position: relative;
        min-height: 148px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--panel), var(--teal) 2%), var(--panel)),
          var(--panel);
      }

      .loop-card::after {
        content: "";
        position: absolute;
        right: -10px;
        top: 50%;
        width: 10px;
        height: 1px;
        background: var(--line);
      }

      .loop-card:last-child::after {
        display: none;
      }

      .loop-card small {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .loop-card strong {
        display: block;
        margin-top: 6px;
        font-size: 22px;
      }

      .loop-card p {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .loop-card button {
        margin-top: 10px;
      }

      .timeline {
        display: grid;
        gap: 7px;
      }

      .timeline-row,
      .list-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 7px 9px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel-2);
      }

      .timeline-row strong,
      .list-row strong {
        display: block;
        font-size: 13px;
      }

      .timeline-row span:not(.pill),
      .list-row span:not(.pill) {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .pipeline {
        display: grid;
        grid-template-columns: 270px minmax(0, 1fr);
        gap: 12px;
      }

      .pipeline-list {
        display: grid;
        gap: 8px;
      }

      .pipeline-item {
        width: 100%;
        padding: 11px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel);
        color: var(--ink);
        text-align: left;
      }

      .pipeline-item.active {
        border-color: color-mix(in srgb, var(--teal), transparent 34%);
        box-shadow: inset 3px 0 0 var(--teal);
      }

      .pipeline-item strong {
        display: block;
        font-size: 13px;
      }

      .pipeline-item span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .detail-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 12px;
      }

      .info-block {
        padding: 12px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel-2);
      }

      .info-block h3 {
        margin-bottom: 7px;
        font-size: 13px;
      }

      .info-block p,
      .info-block li {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .info-block ul {
        margin: 0;
        padding-left: 18px;
      }

      .projection {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
      }

      .node {
        min-height: 132px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
      }

      .node h3 {
        font-size: 13px;
      }

      .node p {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .projection-line {
        display: grid;
        gap: 8px;
      }

      .projection-line div {
        position: relative;
        min-height: 42px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel-2);
        padding: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .review-grid {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 12px;
      }

      .evidence {
        display: grid;
        gap: 8px;
      }

      .script-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .script-card {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
      }

      .script-card code,
      .path {
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        font-size: 12px;
      }

      .steps {
        display: grid;
        gap: 9px;
      }

      .step {
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 11px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel);
      }

      .step-index {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        color: #fff8e8;
        background: var(--navy);
        font-size: 12px;
        font-weight: 760;
      }

      .logo-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .logo-card {
        padding: 14px;
      }

      .logo-card.active {
        border-color: color-mix(in srgb, var(--gold), transparent 18%);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--gold), transparent 84%);
      }

      .logo-card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }

      .logo-card h3 {
        font-size: 15px;
      }

      .logo-card p {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .logo-previews {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 10px;
        align-items: stretch;
      }

      .app-preview {
        display: grid;
        place-items: center;
        min-height: 92px;
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background:
          linear-gradient(145deg, color-mix(in srgb, var(--navy), #07111d 26%), #081523),
          var(--navy);
      }

      .preview-stack {
        display: grid;
        gap: 8px;
      }

      .title-preview,
      .menu-preview {
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 42px;
        padding: 8px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel-2);
      }

      .title-preview strong,
      .menu-preview strong {
        display: block;
        font-size: 12px;
      }

      .title-preview span,
      .menu-preview span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .mini-mark {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        border-radius: 8px;
        background: var(--navy);
        color: #fff8e8;
      }

      .mark-svg {
        display: block;
        width: var(--mark-size, 28px);
        height: var(--mark-size, 28px);
        overflow: visible;
      }

      .mark-svg .stroke {
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .mark-svg .fill {
        fill: currentColor;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 220px;
        border: 1px dashed var(--line);
        border-radius: var(--radius);
        color: var(--muted);
        background: var(--panel-2);
        text-align: center;
      }

      .menu-top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line-soft);
      }

      .menu-product {
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
      }

      .menu-product h2 {
        font-size: 21px;
        line-height: 1.1;
      }

      .local-dot {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #334155;
        font-size: 12px;
      }

      .local-dot::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
      }

      .menu-icons {
        display: flex;
        gap: 12px;
        color: #111827;
        font-size: 18px;
      }

      .today-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 18px 0;
        color: #111827;
        font-size: 13px;
        font-weight: 700;
      }

      .health-card {
        display: grid;
        grid-template-columns: 126px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
      }

      .health-ring {
        position: relative;
        display: grid;
        grid-template-rows: auto auto;
        place-content: center;
        justify-items: center;
        gap: 2px;
        width: 100px;
        height: 100px;
        margin: 2px auto;
        border-radius: 50%;
        background: conic-gradient(var(--teal) 0 82%, #dbe3ed 82% 100%);
      }

      .health-ring::after {
        content: "";
        position: absolute;
        inset: 11px;
        border-radius: 50%;
        background: #fff;
      }

      .health-ring strong,
      .health-ring span {
        position: relative;
        z-index: 1;
      }

      .health-ring strong {
        font-size: 24px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .health-ring span {
        color: var(--teal);
        font-size: 12px;
        line-height: 1;
        font-weight: 700;
      }

      .health-list {
        display: grid;
        gap: 7px;
        font-size: 12px;
      }

      .health-list div,
      .health-line {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
      }

      .legend-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--teal);
      }

              <div class="info-block"><h3>证据</h3><p class="path">registry/skills/workflow/grill-me/SKILL.md<br />~/.codex/skills/grill-me/SKILL.md</p></div>
              <div class="info-block"><h3>建议</h3><p>创建实践卡片关系，或通过采纳流程把目标资产纳入注册表管理。</p></div>
              <div class="info-block"><h3>安全边界</h3><p>不直接改写目标。先生成清单、差异和备份计划。</p></div>
            </div>
          </section>
        </div>`;
      }

      function renderOperations() {
        return `<div class="grid">
          <section class="surface">
            <div class="surface-head">
              <div><h2>运维脚本</h2><p>本机代理操作环境的集中控制，和实践卡片分离。</p></div>
              <span class="pill good">默认只读</span>
            </div>
            <div class="script-grid">
              ${scripts
                .map(([path, name, detail, stateLabel, level]) => `<article class="script-card">
                  <div class="surface-head"><h3>${name}</h3><span class="pill ${level}">${stateLabel}</span></div>
                  <p class="path">${path}</p>
                  <p class="meta">${detail}</p>
                  <div class="inline-actions" style="margin-top: 12px">
                    <button class="button" type="button">预览</button>
                    <button class="button primary" type="button">确认运行</button>
                  </div>
                </article>`)
                .join("")}
            </div>
          </section>
          <section class="surface">
            <div class="surface-head"><div><h3>运行审计</h3><p>高风险动作必须进入审计轨迹。</p></div></div>
            <div class="timeline">
              <div class="timeline-row"><div><strong>start-codex.sh 预览</strong><span>已生成 launchctl 环境差异，未重启</span></div><span class="pill">预览</span></div>
              <div class="timeline-row"><div><strong>dsleep 已停止</strong><span>没有运行中的 caffeinate 进程</span></div><span class="pill good">空闲</span></div>
            </div>
          </section>
        </div>`;
      }

      function renderSettings() {
        return `<section class="surface">
          <div class="surface-head">
            <div><h2>首次运行授权</h2><p>每个边界分开授权，首次启动不自动联网。</p></div>
            <span class="pill warn">分步授权</span>
          </div>
          <div class="steps">
            ${firstRunSteps
              .map(([name, desc, status], index) => `<div class="step">
                <span class="step-index">${index + 1}</span>
                <div><strong>${name}</strong><span class="meta">${desc}</span></div>
                <span class="pill">${status}</span>
              </div>`)
              .join("")}
          </div>
        </section>`;
      }

      function renderLogoLab() {
        return `<div class="grid">
          <section class="surface">
            <div class="surface-head">
              <div><h2>标志实验室</h2><p>四套方向都放进实际产品位置中比较；选择只影响本原型预览。</p></div>
              <span class="pill good">仅原型</span>
            </div>
            <div class="logo-grid">
              ${logos
                .map((logo) => `<article class="logo-card ${state.logo === logo.id ? "active" : ""}">
                  <div class="logo-card-head">
                    <div>
                      <h3>${logo.name}</h3>
                      <p>${logo.summary}</p>
                    </div>
                    <button class="chip-button ${state.logo === logo.id ? "active" : ""}" type="button" data-logo-choice="${logo.id}">${state.logo === logo.id ? "已选择" : "使用"}</button>
                  </div>
                  <div class="logo-previews">
                    <div class="app-preview">${logoSvg(logo.id, 54)}</div>
                    <div class="preview-stack">
                      <div class="title-preview">
                        <span class="mini-mark">${logoSvg(logo.id, 20)}</span>
                        <div><strong>Hone 工作台</strong><span>实践运营控制台</span></div>
                      </div>
                      <div class="menu-preview">
                        <span class="mini-mark">${logoSvg(logo.id, 20)}</span>
                        <div><strong>Hone 今日</strong><span>2 个偏移 · 4 个待处理</span></div>
                      </div>
                    </div>
                  </div>
                </article>`)
                .join("")}
            </div>
          </section>
        </div>`;
      }

      function renderMenuAudit() {
        const menuAudit = document.getElementById("menuAudit");
        if (!menuAudit) return;
        menuAudit.innerHTML = audit
          .slice(0, 3)
          .map(([time, title, detail]) => `<div class="timeline-row"><div><strong>${title}</strong><span>${detail}</span></div><span class="pill">${time}</span></div>`)
          .join("");
      }

      function render() {
        const [title, subtitle] = viewMeta();
        document.getElementById("viewTitle").textContent = title;
        document.getElementById("viewSubtitle").textContent = subtitle;
        document.documentElement.dataset.theme = state.theme;
        document.getElementById("themeToggle").textContent = state.theme === "light" ? "深色" : "浅色";
        renderLogoSlots();
        renderNav();
        renderMenuAudit();
        const content = document.getElementById("content");
        if (state.view === "library") content.innerHTML = renderLibrary();
        else if (state.view === "apply") content.innerHTML = renderApply();
        else if (state.view === "review") content.innerHTML = renderReview();
        else if (state.view === "operations") content.innerHTML = renderOperations();
        else if (state.view === "settings") content.innerHTML = renderSettings();
        else if (state.view === "logo") content.innerHTML = renderLogoLab();
        else content.innerHTML = renderHome();
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.openLogoLab !== undefined) setView("logo");
        if (target.dataset.view) setView(target.dataset.view);
        if (target.dataset.libraryTab) {
          state.libraryTab = target.dataset.libraryTab;
          render();
        }
        if (target.dataset.signal) {
          state.selectedSignal = target.dataset.signal;
          render();
        }
        if (target.dataset.syncMode) {
          state.syncMode = target.dataset.syncMode;
          render();
        }
        if (target.dataset.review) {
          state.selectedReview = target.dataset.review;
          render();
        }
        if (target.dataset.logoChoice) {
          state.logo = target.dataset.logoChoice;
          render();
        }
      });

      document.getElementById("themeToggle").addEventListener("click", () => {
        state.theme = state.theme === "light" ? "dark" : "light";
        render();
      });

      render();
    </script>
  </body>
</html>
