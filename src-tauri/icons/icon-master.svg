<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="512" y1="102" x2="512" y2="922" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square with macOS-standard padding (~10% each side) -->
  <rect x="102" y="102" width="820" height="820" rx="184" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="102" y="102" width="820" height="820" rx="184" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Three vertical fader tracks -->
  <!-- Track backgrounds -->
  <rect x="306" y="320" width="28" height="384" rx="14" fill="white" fill-opacity="0.06"/>
  <rect x="498" y="320" width="28" height="384" rx="14" fill="white" fill-opacity="0.06"/>
  <rect x="690" y="320" width="28" height="384" rx="14" fill="white" fill-opacity="0.06"/>

  <!-- Active level fills (below knobs) -->
  <!-- Left track: knob at y=490 → fill from 490 to 704 -->
  <rect x="306" y="490" width="28" height="214" rx="14" fill="url(#teal)" fill-opacity="0.5"/>
  <!-- Center track: knob at y=410 → fill from 410 to 704 -->
  <rect x="498" y="410" width="28" height="294" rx="14" fill="url(#teal)" fill-opacity="0.5"/>
  <!-- Right track: knob at y=570 → fill from 570 to 704 -->
  <rect x="690" y="570" width="28" height="134" rx="14" fill="url(#teal)" fill-opacity="0.5"/>

  <!-- Fader knobs with glow -->
  <!-- Left knob at y=490 -->
  <circle cx="320" cy="490" r="28" fill="white" filter="url(#glow)" fill-opacity="0.95"/>
  <circle cx="320" cy="490" r="12" fill="#5eead4"/>

  <!-- Center knob at y=410 -->
  <circle cx="512" cy="410" r="28" fill="white" filter="url(#glow)" fill-opacity="0.95"/>
  <circle cx="512" cy="410" r="12" fill="#5eead4"/>

  <!-- Right knob at y=570 -->
  <circle cx="704" cy="570" r="28" fill="white" filter="url(#glow)" fill-opacity="0.95"/>
  <circle cx="704" cy="570" r="12" fill="#5eead4"/>

  <!-- Track endpoint dots (top) -->
  <circle cx="320" cy="334" r="5" fill="white" fill-opacity="0.2"/>
  <circle cx="512" cy="334" r="5" fill="white" fill-opacity="0.2"/>
  <circle cx="704" cy="334" r="5" fill="white" fill-opacity="0.2"/>

  <!-- Track endpoint dots (bottom) -->
  <circle cx="320" cy="690" r="5" fill="white" fill-opacity="0.2"/>
  <circle cx="512" cy="690" r="5" fill="white" fill-opacity="0.2"/>
  <circle cx="704" cy="690" r="5" fill="white" fill-opacity="0.2"/>
</svg>
